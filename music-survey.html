<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <title>Music Survey</title>

   <style>
       body {
           font-family: Arial, sans-serif;
       }

       fieldset {
           width: 350px;
           margin-bottom: 15px;
       }
     </style>
 </head>

<body>

<h1>Music Survey</h1>

<form action=https://formspree.io/f/xqegkbao method="POST">

    <! -- Name -->
    <label for="email">E-Mail:</label><br>
    <input type="email" id="email" name="email" required><br><br>

    <! -- Scrolling Text Box -->
    <label for="comments">Comments:</label><br>
    <textarea id="comments" name="comments" rows="3" cols="60"></textarea><br><br>

<! -- Checkbox Group -- >
<fieldset>
    <legend>Select Your Favorite Types of Music:</legend>

    <input type="checkbox" name="music" value="Pop"> Pop<br>
    <input type="checkbox" name="music" value="Classical"> Classical<br>
    <input type="checkbox" name="music" value="Rock"> Rock<br>
    <input type="checkbox" name="music" value="Folk"> Folk<br>
</fieldset>

<! -- Radio Button Group -->
<fieldset>
   <legend>Select how often you purchase Music:</legend>

   <input type="radio" name="frequency" value="Weekly"> Weekly<br>
   <input type="radio" name="frequency" value="Monthly"> Monthly<br>
   <input type="radio" name="frequency" value="Yearly"> A few CDs each year<br>
   <input type="radio" name="frequency" value="Never"> Never<br>
</fieldset>

<! -- Select Box -->
<label for="device">How do you listen to music?</label><br>
<select id="device" name="device" size="3">
    <option>Phone</option>
    <option>Computer</option>
    <option>Radio</option>
    <option>Vinyl Player</option>
</select><br><br>

<! -- Buttons -->
<input type="submit" value="Submit">
<input type="reset" value="Reset">

</form>

</body>
</html>
